name: Release

on:
  push:
    branches: [main, prod]
    tags: ["v*"]

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

env:
  REGISTRY: public.ecr.aws/anomalo/kelos

jobs:
  prepare:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
    steps:
      - name: Determine version
        id: version
        run: |
          if [[ "${GITHUB_REF}" == refs/tags/v* ]]; then
            echo "version=${GITHUB_REF#refs/tags/}" >> "$GITHUB_OUTPUT"
          else
            echo "version=${GITHUB_REF#refs/heads/}" >> "$GITHUB_OUTPUT"
          fi

  agent-base:
    needs: prepare
    permissions:
      contents: read
      id-token: write
    strategy:
      fail-fast: false
      matrix:
        arch: [amd64, arm64]
        include:
          - arch: amd64
            runner: ubuntu-latest
          - arch: arm64
            runner: ubuntu-24.04-arm
    runs-on: ${{ matrix.runner }}
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd # v4.0.0

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v6
        with:
          role-to-assume: arn:aws:iam::580663733917:role/github-actions
          aws-region: us-east-1

      - name: Login to Amazon ECR
        uses: aws-actions/amazon-ecr-login@v2
        with:
          registry-type: public

      - name: Build and push agent-base
        env:
          BUILDX_CACHE_TYPE: gha
          VERSION: ${{ needs.prepare.outputs.version }}-${{ matrix.arch }}
        run: make push-image WHAT=agent-base VERSION="$VERSION" REGISTRY="${{ env.REGISTRY }}"

  go-images:
    needs: prepare
    permissions:
      contents: read
      id-token: write
    strategy:
      fail-fast: false
      matrix:
        dir:
          - cmd/kelos-controller
          - cmd/kelos-spawner
          - cmd/kelos-token-refresher
          - cmd/kelos-webhook-receiver
        arch: [amd64, arm64]
        include:
          - arch: amd64
            runner: ubuntu-latest
          - arch: arm64
            runner: ubuntu-24.04-arm
    runs-on: ${{ matrix.runner }}
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd # v4.0.0

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v6
        with:
          role-to-assume: arn:aws:iam::580663733917:role/github-actions
          aws-region: us-east-1

      - name: Login to Amazon ECR
        uses: aws-actions/amazon-ecr-login@v2
        with:
          registry-type: public

      - name: Build and push image
        env:
          BUILDX_CACHE_TYPE: gha
          VERSION: ${{ needs.prepare.outputs.version }}-${{ matrix.arch }}
        run: make push-image WHAT=${{ matrix.dir }} VERSION="$VERSION" REGISTRY="${{ env.REGISTRY }}"

  agent-images:
    needs: [prepare, agent-base]
    permissions:
      contents: read
      id-token: write
    strategy:
      fail-fast: false
      matrix:
        dir:
          - claude-code
          - codex
          - gemini
          - opencode
          - cursor
        arch: [amd64, arm64]
        include:
          - arch: amd64
            runner: ubuntu-latest
          - arch: arm64
            runner: ubuntu-24.04-arm
    runs-on: ${{ matrix.runner }}
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd # v4.0.0

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v6
        with:
          role-to-assume: arn:aws:iam::580663733917:role/github-actions
          aws-region: us-east-1

      - name: Login to Amazon ECR
        uses: aws-actions/amazon-ecr-login@v2
        with:
          registry-type: public

      - name: Build and push image
        env:
          BUILDX_CACHE_TYPE: gha
          VERSION: ${{ needs.prepare.outputs.version }}-${{ matrix.arch }}
          BASE_IMAGE: ${{ env.REGISTRY }}/agent-base:${{ needs.prepare.outputs.version }}-${{ matrix.arch }}
        run: make push-image WHAT=${{ matrix.dir }} VERSION="$VERSION" BASE_IMAGE="$BASE_IMAGE" REGISTRY="${{ env.REGISTRY }}"

  manifests:
    needs: [prepare, go-images, agent-images]
    permissions:
      contents: read
      id-token: write
    strategy:
      fail-fast: false
      matrix:
        image:
          - kelos-controller
          - kelos-spawner
          - kelos-token-refresher
          - kelos-webhook-receiver
          - claude-code
          - codex
          - gemini
          - opencode
          - cursor
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd # v4.0.0

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v6
        with:
          role-to-assume: arn:aws:iam::580663733917:role/github-actions
          aws-region: us-east-1

      - name: Login to Amazon ECR
        uses: aws-actions/amazon-ecr-login@v2
        with:
          registry-type: public

      - name: Create multi-arch manifest
        run: make create-manifest IMAGE=${{ matrix.image }} VERSION="${{ needs.prepare.outputs.version }}" REGISTRY="${{ env.REGISTRY }}"

  push-latest:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: [prepare, manifests]
    permissions:
      contents: read
      id-token: write
    strategy:
      fail-fast: false
      matrix:
        image:
          - kelos-controller
          - kelos-spawner
          - kelos-token-refresher
          - kelos-webhook-receiver
          - claude-code
          - codex
          - gemini
          - opencode
          - cursor
    runs-on: ubuntu-latest
    steps:
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd # v4.0.0

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v6
        with:
          role-to-assume: arn:aws:iam::580663733917:role/github-actions
          aws-region: us-east-1

      - name: Login to Amazon ECR
        uses: aws-actions/amazon-ecr-login@v2
        with:
          registry-type: public

      - name: Tag as latest
        run: |
          docker buildx imagetools create \
            -t ${{ env.REGISTRY }}/${{ matrix.image }}:latest \
            ${{ env.REGISTRY }}/${{ matrix.image }}:${{ needs.prepare.outputs.version }}

  release-binaries:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: prepare
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Build CLI binaries
        env:
          VERSION: ${{ needs.prepare.outputs.version }}
        run: make release-binaries VERSION="$VERSION"

      - name: Generate release notes
        env:
          GH_TOKEN: ${{ github.token }}
          VERSION: ${{ needs.prepare.outputs.version }}
        run: go run ./hack/release-notes "$VERSION" > /tmp/release-notes.md

      - name: Upload CLI binaries to GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
          VERSION: ${{ needs.prepare.outputs.version }}
        run: |
          gh release create "$VERSION" --verify-tag --draft --title "$VERSION" --notes-file /tmp/release-notes.md || true
          gh release upload "$VERSION" --clobber \
            bin/kelos-* \
            bin/checksums.txt
