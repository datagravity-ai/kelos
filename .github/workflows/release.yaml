name: Release

on:
  push:
    branches: [main]
    tags: ["v*"]

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  prepare:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
    steps:
      - name: Determine version
        id: version
        run: |
          if [[ "${GITHUB_REF}" == refs/tags/v* ]]; then
            echo "version=${GITHUB_REF#refs/tags/}" >> "$GITHUB_OUTPUT"
          else
            echo "version=main" >> "$GITHUB_OUTPUT"
          fi

  agent-base:
    needs: prepare
    permissions:
      contents: read
      packages: write
    strategy:
      fail-fast: false
      matrix:
        arch: [amd64, arm64]
        include:
          - arch: amd64
            runner: ubuntu-latest
          - arch: arm64
            runner: ubuntu-24.04-arm
    runs-on: ${{ matrix.runner }}
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push agent-base
        env:
          BUILDX_CACHE_TYPE: gha
          VERSION: ${{ needs.prepare.outputs.version }}-${{ matrix.arch }}
        run: |
          docker buildx build \
            --cache-from type=$BUILDX_CACHE_TYPE,scope=agent-base-${{ matrix.arch }} \
            --cache-to type=$BUILDX_CACHE_TYPE,scope=agent-base-${{ matrix.arch }},mode=max \
            --provenance=false \
            -t ghcr.io/kelos-dev/agent-base:$VERSION \
            -f agent-base/Dockerfile --push .

  go-images:
    needs: prepare
    permissions:
      contents: read
      packages: write
    strategy:
      fail-fast: false
      matrix:
        dir:
          - cmd/kelos-controller
          - cmd/kelos-spawner
          - cmd/kelos-token-refresher
          - cmd/ghproxy
        arch: [amd64, arm64]
        include:
          - arch: amd64
            runner: ubuntu-latest
          - arch: arm64
            runner: ubuntu-24.04-arm
    runs-on: ${{ matrix.runner }}
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push image
        env:
          BUILDX_CACHE_TYPE: gha
          VERSION: ${{ needs.prepare.outputs.version }}-${{ matrix.arch }}
        run: |
          name=$(basename ${{ matrix.dir }})
          docker buildx build \
            --cache-from type=$BUILDX_CACHE_TYPE,scope=$name-${{ matrix.arch }} \
            --cache-to type=$BUILDX_CACHE_TYPE,scope=$name-${{ matrix.arch }},mode=max \
            --provenance=false \
            -t ghcr.io/kelos-dev/$name:$VERSION \
            -f ${{ matrix.dir }}/Dockerfile --push .

  agent-images:
    needs: [prepare, agent-base]
    permissions:
      contents: read
      packages: write
    strategy:
      fail-fast: false
      matrix:
        dir:
          - claude-code
          - codex
          - gemini
          - opencode
          - cursor
        arch: [amd64, arm64]
        include:
          - arch: amd64
            runner: ubuntu-latest
          - arch: arm64
            runner: ubuntu-24.04-arm
    runs-on: ${{ matrix.runner }}
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push image
        env:
          BUILDX_CACHE_TYPE: gha
          VERSION: ${{ needs.prepare.outputs.version }}-${{ matrix.arch }}
          BASE_IMAGE: ghcr.io/kelos-dev/agent-base:${{ needs.prepare.outputs.version }}-${{ matrix.arch }}
        run: |
          name=$(basename ${{ matrix.dir }})
          docker buildx build \
            --cache-from type=$BUILDX_CACHE_TYPE,scope=$name-${{ matrix.arch }} \
            --cache-to type=$BUILDX_CACHE_TYPE,scope=$name-${{ matrix.arch }},mode=max \
            --build-arg BASE_IMAGE=$BASE_IMAGE \
            --provenance=false \
            -t ghcr.io/kelos-dev/$name:$VERSION \
            -f ${{ matrix.dir }}/Dockerfile --push .

  manifests:
    needs: [prepare, agent-base, go-images, agent-images]
    permissions:
      contents: read
      packages: write
    strategy:
      fail-fast: false
      matrix:
        image:
          - agent-base
          - kelos-controller
          - kelos-spawner
          - kelos-token-refresher
          - ghproxy
          - claude-code
          - codex
          - gemini
          - opencode
          - cursor
    runs-on: ubuntu-latest
    steps:
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Create multi-arch manifest
        run: |
          docker buildx imagetools create \
            -t ghcr.io/kelos-dev/${{ matrix.image }}:${{ needs.prepare.outputs.version }} \
            ghcr.io/kelos-dev/${{ matrix.image }}:${{ needs.prepare.outputs.version }}-amd64 \
            ghcr.io/kelos-dev/${{ matrix.image }}:${{ needs.prepare.outputs.version }}-arm64

  push-latest:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: [prepare, manifests]
    permissions:
      contents: read
      packages: write
    strategy:
      fail-fast: false
      matrix:
        image:
          - agent-base
          - kelos-controller
          - kelos-spawner
          - kelos-token-refresher
          - ghproxy
          - claude-code
          - codex
          - gemini
          - opencode
          - cursor
    runs-on: ubuntu-latest
    steps:
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Tag as latest
        run: |
          docker buildx imagetools create \
            -t ghcr.io/kelos-dev/${{ matrix.image }}:latest \
            ghcr.io/kelos-dev/${{ matrix.image }}:${{ needs.prepare.outputs.version }}

  release-binaries:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: prepare
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Build CLI binaries
        env:
          VERSION: ${{ needs.prepare.outputs.version }}
        run: make release-binaries VERSION="$VERSION"

      - name: Generate release notes
        env:
          GH_TOKEN: ${{ github.token }}
          VERSION: ${{ needs.prepare.outputs.version }}
        run: go run ./hack/release-notes "$VERSION" > /tmp/release-notes.md

      - name: Upload CLI binaries to GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
          VERSION: ${{ needs.prepare.outputs.version }}
        run: |
          gh release create "$VERSION" --verify-tag --draft --title "$VERSION" --notes-file /tmp/release-notes.md || true
          gh release upload "$VERSION" --clobber \
            bin/kelos-* \
            bin/checksums.txt

  publish-helm-chart:
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    needs: release
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Install Helm
        uses: azure/setup-helm@v4
        with:
          version: 3.20.1

      - name: Determine version
        id: version
        run: |
          # Extract version without 'v' prefix (e.g., v1.2.3 -> 1.2.3)
          VERSION=${GITHUB_REF#refs/tags/v}
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Login to GHCR
        run: |
          helm registry login ghcr.io \
            -u ${{ github.actor }} \
            -p ${{ secrets.GITHUB_TOKEN }}

      - name: Set image tag in chart values
        run: |
          sed -i 's|tag: "latest"|tag: "${{ github.ref_name }}"|' \
            internal/manifests/charts/kelos/values.yaml
          grep -q 'tag: "${{ github.ref_name }}"' \
            internal/manifests/charts/kelos/values.yaml

      - name: Package Helm chart
        run: |
          mkdir -p /tmp/charts
          helm package internal/manifests/charts/kelos \
            --version ${{ steps.version.outputs.version }} \
            --app-version ${{ github.ref_name }} \
            --destination /tmp/charts

      - name: Push Helm chart to GHCR
        run: |
          helm push /tmp/charts/kelos-${{ steps.version.outputs.version }}.tgz oci://ghcr.io/kelos-dev/charts
