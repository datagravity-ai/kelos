crds:
  install: true
  keep: true

image:
  tag: "latest"
  pullPolicy: ""

telemetry:
  enabled: true

controllerImage: ghcr.io/kelos-dev/kelos-controller
ghproxy:
  image: ghcr.io/kelos-dev/ghproxy
  allowedUpstreams: "https://api.github.com"
  cacheTTL: ""
  resources:
    requests: ""
    limits: ""
claudeCodeImage: ghcr.io/kelos-dev/claude-code
codexImage: ghcr.io/kelos-dev/codex
geminiImage: ghcr.io/kelos-dev/gemini
opencodeImage: ghcr.io/kelos-dev/opencode
cursorImage: ghcr.io/kelos-dev/cursor
spawner:
  image: ghcr.io/kelos-dev/kelos-spawner
  resources:
    requests: ""
    limits: ""
controller:
  resources:
    requests: {}
    limits: {}
webhookServer:
  image: ghcr.io/kelos-dev/kelos-webhook-server
  sources:
    github:
      enabled: false
      replicas: 1
      secretName: ""
      githubSecretName: ""
    linear:
      enabled: false
      replicas: 1
      secretName: ""
      apiKeySecretName: ""
    generic:
      enabled: false
      replicas: 1
      # Name of a Secret containing per-source HMAC keys as individual keys.
      # Each key should be named <SOURCE>_WEBHOOK_SECRET (e.g.,
      # NOTION_WEBHOOK_SECRET, SENTRY_WEBHOOK_SECRET).
      secretName: ""
      # Per-source secrets from separate Kubernetes Secrets.
      # Each entry maps a key from an external Secret to a pod env var.
      # Example:
      #   webhookSecrets:
      #     - envName: LINEAR_COMMENT_WEBHOOK_SECRET
      #       secretName: linear-comment-webhook-secret
      #       secretKey: WEBHOOK_SECRET
      webhookSecrets: []
  resources:
    limits:
      cpu: 500m
      memory: 128Mi
    requests:
      cpu: 10m
      memory: 64Mi
  ingress:
    enabled: false
    className: ""
    host: ""
    annotations: {}
    tls:
      enabled: false
      secretName: ""
  gateway:
    enabled: false
    gatewayClassName: ""
    gatewayName: "kelos-webhook-gateway"
    host: ""
    annotations: {}
    tls:
      enabled: false
      certificateRefs: []
